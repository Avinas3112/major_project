<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Disease Prediction System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
            width: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .results-section {
            margin-top: 30px;
        }
        
        .result-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        
        .severity-low {
            border-left-color: #4caf50;
        }
        
        .severity-medium {
            border-left-color: #ff9800;
        }
        
        .severity-high {
            border-left-color: #f44336;
        }
        
        .severity-emergency {
            border-left-color: #d32f2f;
            background: #ffebee;
        }
        
        .disease-prediction {
            margin-bottom: 20px;
        }
        
        .disease-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .disease-name {
            font-weight: 600;
            color: #333;
        }
        
        .disease-prob {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .severity-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        
        .severity-badge.low {
            background: #c8e6c9;
            color: #1b5e20;
        }
        
        .severity-badge.medium {
            background: #ffe0b2;
            color: #e65100;
        }
        
        .severity-badge.high {
            background: #ffcdd2;
            color: #b71c1c;
        }
        
        .severity-badge.emergency {
            background: #f8bbd0;
            color: #880e4f;
        }
        
        .doctor-recommendation {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .doctor-specialist {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .doctor-details {
            font-size: 0.9em;
            color: #666;
            margin-top: 8px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffebee;
            border: 2px solid #f44336;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .success {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            color: #1b5e20;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
        }
        
        .info-box strong {
            color: #1565c0;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 1.8em;
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Disease Prediction System</h1>
            <p>AI-Powered Healthcare Decision Support</p>
        </header>
        
        <div class="main-content">
            <!-- Input Form -->
            <div class="card">
                <h2>Patient Information</h2>
                
                <form id="patientForm">
                    <div class="form-group">
                        <label for="symptoms">Symptoms <span style="color: red;">*</span></label>
                        <textarea id="symptoms" required placeholder="e.g., fever, cough, sore throat, body ache">
</textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="age">Age <span style="color: red;">*</span></label>
                            <input type="number" id="age" required min="1" max="120" value="30" placeholder="Age in years">
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender <span style="color: red;">*</span></label>
                            <select id="gender" required>
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="height">Height (cm) <span style="color: red;">*</span></label>
                            <input type="number" id="height" required min="50" max="250" step="0.1" value="170" placeholder="in cm">
                        </div>
                        <div class="form-group">
                            <label for="weight">Weight (kg) <span style="color: red;">*</span></label>
                            <input type="number" id="weight" required min="20" max="300" step="0.1" value="70" placeholder="in kg">
                        </div>
                    </div>
                    
                    <div class="info-box">
                        <strong>Optional Vitals:</strong> Fill these if available
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="sysBP">Systolic BP (mmHg)</label>
                            <input type="number" id="sysBP" min="60" max="250" value="120" placeholder="e.g., 120">
                        </div>
                        <div class="form-group">
                            <label for="diaBP">Diastolic BP (mmHg)</label>
                            <input type="number" id="diaBP" min="40" max="150" value="80" placeholder="e.g., 80">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="bloodSugar">Blood Sugar (mg/dL)</label>
                        <input type="number" id="bloodSugar" min="50" max="500" value="100" placeholder="e.g., 100">
                    </div>
                    
                    <button type="submit" id="predictBtn">Predict Disease</button>
                </form>
            </div>
            
            <!-- Results Section -->
            <div class="card">
                <h2>Prediction Results</h2>
                <div id="resultsContainer" class="hidden">
                    <!-- Predictions will be displayed here -->
                </div>
                <div id="noResults" style="text-align: center; color: #999; padding: 40px 20px;">
                    <p>Enter patient information and click "Predict Disease" to see results</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000';
        
        document.getElementById('patientForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const symptoms = document.getElementById('symptoms').value;
            const age = parseFloat(document.getElementById('age').value);
            const gender = document.getElementById('gender').value;
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const systolic_bp = parseFloat(document.getElementById('sysBP').value);
            const diastolic_bp = parseFloat(document.getElementById('diaBP').value);
            const blood_sugar = parseFloat(document.getElementById('bloodSugar').value);
            
            if (!symptoms || !gender) {
                alert('Please fill in all required fields');
                return;
            }
            
            showLoading();
            
            try {
                const response = await fetch(`${API_URL}/predict_disease`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        symptoms,
                        age,
                        gender,
                        height,
                        weight,
                        systolic_bp,
                        diastolic_bp,
                        blood_sugar
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayResults(data);
                } else {
                    showError(data.error || 'Prediction failed');
                }
            } catch (error) {
                showError('Error connecting to server: ' + error.message);
            }
        });
        
        function showLoading() {
            const container = document.getElementById('resultsContainer');
            container.classList.remove('hidden');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Analyzing symptoms and generating predictions...</p>
                </div>
            `;
            document.getElementById('noResults').classList.add('hidden');
        }
        
        function displayResults(data) {
            const container = document.getElementById('resultsContainer');
            const severity = data.severity;
            const severityClass = severity.level.toLowerCase();
            
            let html = `
                <div class="result-card severity-${severityClass}">
                    <div class="severity-badge ${severityClass}">
                        ${severity.level.toUpperCase()}
                    </div>
                    
                    <div class="disease-prediction">
                        <h3 style="margin-bottom: 15px; color: #333;">Top Disease Predictions</h3>
            `;
            
            // Display top diseases
            data.top_diseases.forEach((disease, index) => {
                const probability = (disease.probability * 100).toFixed(1);
                html += `
                    <div class="disease-item">
                        <span class="disease-name">${index + 1}. ${disease.disease}</span>
                        <span class="disease-prob">${probability}%</span>
                    </div>
                `;
            });
            
            html += `
                    </div>
                    
                    <div style="background: white; padding: 15px; border-radius: 5px; margin-top: 15px;">
                        <h4 style="color: #333; margin-bottom: 10px;">Severity Assessment</h4>
                        <p><strong>Urgency Level:</strong> ${severity.urgency}</p>
                        <p><strong>Reasoning:</strong> ${severity.reasoning}</p>
                        <div style="background: #f5f5f5; padding: 10px; border-radius: 3px; margin-top: 10px; color: #666;">
                            <strong style="color: #333;">Recommendation:</strong><br>
                            ${severity.recommendation}
                        </div>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
            container.classList.remove('hidden');
            document.getElementById('noResults').classList.add('hidden');
        }
        
        function showError(message) {
            const container = document.getElementById('resultsContainer');
            container.classList.remove('hidden');
            container.innerHTML = `<div class="error"><strong>Error:</strong> ${message}</div>`;
            document.getElementById('noResults').classList.add('hidden');
        }
    </script>
</body>
</html>
